version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3000
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - REDIS_URL=redis://redis:6379
      - MYSQL_HOST=host.docker.internal
      - MYSQL_PORT=3306
      - MYSQL_USER=radius
      - MYSQL_PASSWORD=password
      - MYSQL_DATABASE=radius
      # WhatsApp template settings (for Cloud API fallback)
      - WHATSAPP_TEMPLATE_NAME=payment_confirmation
      - WHATSAPP_TEMPLATE_LANGUAGE_CODE=en_US
      # Use Twilio as the WhatsApp provider
      - WHATSAPP_PROVIDER=twilio
      # Twilio credentials and sender configuration
      - TWILIO_ACCOUNT_SID=AC_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      - TWILIO_AUTH_TOKEN=xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      # EITHER use Messaging Service (recommended for production)
      - TWILIO_MESSAGING_SERVICE_SID=MG_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      # OR specify a From sender (do not set both)
      - TWILIO_WHATSAPP_FROM=whatsapp:+14155238886
      # Optional delivery status callback
      - TWILIO_STATUS_CALLBACK_URL=
    depends_on:
      - redis
      - rabbitmq
    extra_hosts:
      - "host.docker.internal:host-gateway"

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  redis_data:
  rabbitmq_data: 