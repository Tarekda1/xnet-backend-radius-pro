version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3000
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - DB_HOST=${DB_HOST:-host.docker.internal}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USERNAME=${DB_USERNAME:-radius}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_NAME=${DB_NAME:-radius}
      # WhatsApp template settings (for Cloud API fallback)
      - WHATSAPP_TEMPLATE_NAME=${WHATSAPP_TEMPLATE_NAME:-payment_confirmation}
      - WHATSAPP_TEMPLATE_LANGUAGE_CODE=${WHATSAPP_TEMPLATE_LANGUAGE_CODE:-en_US}
      # Use Twilio as the WhatsApp provider
      - WHATSAPP_PROVIDER=${WHATSAPP_PROVIDER:-cloud}
      # Twilio credentials and sender configuration
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      # EITHER use Messaging Service (recommended for production)
      - TWILIO_MESSAGING_SERVICE_SID=${TWILIO_MESSAGING_SERVICE_SID:-}
      # OR specify a From sender (do not set both)
      - TWILIO_WHATSAPP_FROM=${TWILIO_WHATSAPP_FROM:-}
      # Optional delivery status callback
      - TWILIO_STATUS_CALLBACK_URL=${TWILIO_STATUS_CALLBACK_URL:-}
    depends_on:
      - redis
      - rabbitmq
    extra_hosts:
      - "host.docker.internal:host-gateway"

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  redis_data:
  rabbitmq_data: 