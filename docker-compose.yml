services:
  app:
    build: .
    container_name: xnet-backend
    restart: always
    ports:
      - "${APP_HOST_PORT:-3000}:3000"
    stop_grace_period: 30s
    env_file:
      - .env
    environment:
      # WhatsApp sending (disabled by default; enable via .env)
      WHATSAPP_ENABLED: ${WHATSAPP_ENABLED:-false}
      WHATSAPP_PROVIDER: ${WHATSAPP_PROVIDER:-cloud}
      WHATSAPP_TEMPLATE_NAME: ${WHATSAPP_TEMPLATE_NAME:-payment_confirmation}
      WHATSAPP_TEMPLATE_LANGUAGE_CODE: ${WHATSAPP_TEMPLATE_LANGUAGE_CODE:-en_US}

      # Twilio (only used if WHATSAPP_PROVIDER=twilio)
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM:-}
      TWILIO_MESSAGING_SERVICE_SID: ${TWILIO_MESSAGING_SERVICE_SID:-}
      TWILIO_CONTENT_SID: ${TWILIO_CONTENT_SID:-}
      TWILIO_CONTENT_VARIABLES_JSON: ${TWILIO_CONTENT_VARIABLES_JSON:-}
      TWILIO_STATUS_CALLBACK_URL: ${TWILIO_STATUS_CALLBACK_URL:-}

      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}
      # Better logs for Loki (JSON + requestId fields)
      EXPIRY_DISCONNECT_CRON: ${EXPIRY_DISCONNECT_CRON:-*/5 * * * *}
      EXPIRY_DISCONNECT_BATCH: ${EXPIRY_DISCONNECT_BATCH:-100}
      EXPIRY_DISCONNECT_RUN_ON_STARTUP: ${EXPIRY_DISCONNECT_RUN_ON_STARTUP:-1}
    # Do NOT mount the source code in prod compose.
    # Mount only runtime data directories if needed.
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/api/ready',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - backend_network

  prometheus:
    image: quay.io/prometheus/prometheus:v2.55.1
    container_name: xnet-prometheus
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
      prometheus-config:
        condition: service_completed_successfully
    environment:
      # REQUIRED: set this in your .env
      - PROM_REMOTE_WRITE_URL=${PROM_REMOTE_WRITE_URL}
    volumes:
      - prometheus_config:/etc/prometheus:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - backend_network

  prometheus-config:
    image: busybox:1.36
    container_name: xnet-prometheus-config
    restart: "no"
    environment:
      - PROM_REMOTE_WRITE_URL=${PROM_REMOTE_WRITE_URL}
    command:
      - /bin/sh
      - -c
      - |
        if [ -z "$PROM_REMOTE_WRITE_URL" ]; then
          echo "PROM_REMOTE_WRITE_URL is required" >&2
          exit 1
        fi
        mkdir -p /out
        sed "s|__PROM_REMOTE_WRITE_URL__|$PROM_REMOTE_WRITE_URL|g" /tmpl/prometheus.yml.tmpl > /out/prometheus.yml
        cp /tmpl/alerts.yml /out/alerts.yml
    volumes:
      - ./observability/prometheus/prometheus.yml.tmpl:/tmpl/prometheus.yml.tmpl:ro
      - ./observability/prometheus/alerts.yml:/tmpl/alerts.yml:ro
      - prometheus_config:/out
    networks:
      - backend_network
  
  #consumer:
  #  build: .
  #  container_name: user-actions-consumer
  #  command: node dist/userActionsConsumer.js
  #  depends_on:
  #    - rabbitmq
  #  networks:
  #    - backend_network

  redis:
    image: redis:latest
    container_name: redis-server
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - backend_network
  
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"   # AMQP port
      - "15672:15672" # Management UI
      - "15674:15674" # WebSocket port
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    command: >
      bash -c "rabbitmq-plugins enable rabbitmq_web_stomp &&
               rabbitmq-plugins enable rabbitmq_management &&
               rabbitmq-server"
    networks:
      - backend_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  loki:
    image: grafana/loki:3.5.7
    container_name: xnet-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    # Host 3100 is often in Windows Hyper-V / excludedportrange → "access ... forbidden". Use 13100 on host, Loki still 3100 in container.
    ports:
      - "${LOKI_HOST_PORT:-13100}:3100"
    networks:
      - backend_network

  promtail:
    image: grafana/promtail:3.5.7
    container_name: xnet-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./observability/promtail/config.yml:/etc/promtail/config.yml:ro
      # Linux host: default /var/run/docker.sock
      # Windows Docker Desktop: set DOCKER_SOCK=//./pipe/docker_engine in .env
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # FreeRADIUS file logs (detail / auth-detail / radacct) exported by radius-docker-image
      - ../radius-docker-image/logs:/var/log/freeradius:ro
    depends_on:
      - loki
    networks:
      - backend_network
      

  clickhouse:
    image: clickhouse/clickhouse-server:25.1
    container_name: xnet-clickhouse
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      # Simple defaults for local/dev; override via .env if needed
      CLICKHOUSE_DB: flow_logs
      CLICKHOUSE_USER: flow
      CLICKHOUSE_PASSWORD: flowpass
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./observability/clickhouse/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "18123:8123"   # HTTP (host 18123 to avoid Windows Hyper-V port conflict)
      - "9000:9000"   # Native
    networks:
      - backend_network

  flow-ingestor:
    build: .
    container_name: xnet-flow-ingestor
    restart: unless-stopped
    command: node dist/flow/flowIngestor.js
    env_file:
      - .env
    environment:
      # Where MikroTik sends Traffic-Flow (set RouterOS target port to 2055)
      FLOW_LISTEN_PORT: "2055"
      # ClickHouse connection (matches clickhouse service defaults)
      CLICKHOUSE_URL: "http://clickhouse:8123"
      CLICKHOUSE_DB: "flow_logs"
      CLICKHOUSE_USER: "flow"
      CLICKHOUSE_PASSWORD: "flowpass"
      # Optional
      FLOW_USERNAME_CACHE_TTL_MS: "60000"
      FLOW_BATCH_SIZE: "500"
      FLOW_FLUSH_INTERVAL_MS: "2000"
      FLOW_STATS_INTERVAL_MS: "15000"
      # Debug (set to "true" temporarily if you see skipped=... with inserted=0)
      FLOW_LOG_UNMAPPED: "false"
    ports:
      - "2055:2055/udp"
    depends_on:
      clickhouse:
        condition: service_started
    networks:
      - backend_network

  grafana:
    image: grafana/grafana:11.5.2
    container_name: xnet-grafana
    restart: unless-stopped
    depends_on:
      - loki
      - prometheus
      - clickhouse
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      # ClickHouse datasource plugin
      - GF_INSTALL_PLUGINS=vertamedia-clickhouse-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "${GRAFANA_HOST_PORT:-13001}:3000"
    networks:
      - backend_network

networks:
  backend_network:
    driver: bridge

volumes:
  redis_data:
  node_modules_volume:
  prometheus_data:
  prometheus_config:
  loki_data:
  grafana_data:
  clickhouse_data:
