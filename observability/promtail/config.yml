server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s

    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        target_label: container
        regex: '/(.*)'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: project
      - target_label: job
        replacement: xnet-docker

    pipeline_stages:
      - docker: {}

  # FreeRADIUS "detail" file logs (NOT container stdout).
  # These are written under /var/log/freeradius by the radius container and mounted into promtail via docker-compose.yml.
  - job_name: freeradius-files
    static_configs:
      - targets: ['localhost']
        labels:
          job: freeradius-files
          app: freeradius
          __path__: /var/log/freeradius/radius.log
      - targets: ['localhost']
        labels:
          job: freeradius-files
          app: freeradius
          __path__: /var/log/freeradius/radacct/**/auth-detail-*

